<!DOCTYPE html>
<html lang="zh-CN" data-theme="ocean">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星识 Star-Learn - 个人中心</title>
    <link rel="stylesheet" href="/css/tailwind.css">
    <link rel="stylesheet" href="/css/personal.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/js/theme.js"></script>
</head>
<body class="min-h-screen antialiased">

    <div class="mesh-gradient-bg"></div>
    <div class="mesh-orb mesh-orb-1"></div>
    <div class="mesh-orb mesh-orb-2"></div>
    <div class="mesh-orb mesh-orb-3"></div>

    <!-- 顶部导航 -->
    <nav class="personal-nav">
        <a href="/" class="nav-back">
            <i data-lucide="arrow-left" class="w-4 h-4"></i>
            <span>返回首页</span>
        </a>
        <h1 class="nav-title">个人中心</h1>
        <div class="w-16"></div>
    </nav>

    <!-- 主容器 -->
    <main class="personal-container">

        <!-- 第一行：身份卡片 + 操作按钮 -->
        <section class="identity-section">
            <div class="identity-card">
                <div class="avatar-wrapper">
                    <img id="current-avatar" src="" alt="头像" class="avatar-img">
                    <button class="avatar-edit-btn" onclick="document.getElementById('avatar-upload').click()">
                        <i data-lucide="camera" class="w-3 h-3"></i>
                    </button>
                    <input type="file" id="avatar-upload" accept="image/*" class="hidden" onchange="handleAvatarUpload(event)">
                </div>
                <div class="identity-info">
                    <div class="identity-name-row">
                        <span class="identity-name" id="display-name">同学</span>
                        <span class="identity-status">
                            <span class="status-dot"></span>在线
                        </span>
                    </div>
                    <div class="identity-edit-row">
                        <input type="text" id="edit-name" placeholder="修改昵称" class="name-input">
                        <button onclick="saveName()" class="save-btn">
                            <i data-lucide="check" class="w-3 h-3"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="action-buttons">
                <button onclick="goBack()" class="action-btn primary">
                    <i data-lucide="home" class="w-4 h-4"></i>
                    <span>主页</span>
                </button>
                <button onclick="clearData()" class="action-btn danger">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                    <span>清除</span>
                </button>
            </div>
        </section>

        <!-- 第二行：偏好设置 -->
        <section class="prefs-section">
            <div class="section-header">
                <i data-lucide="settings" class="w-3 h-3"></i>
                <span>偏好设置</span>
            </div>
            <div class="prefs-grid">
                <div class="pref-item">
                    <div class="pref-icon" style="background: rgba(59,130,246,0.15);">
                        <i data-lucide="brain" class="w-4 h-4 text-blue-400"></i>
                    </div>
                    <div class="pref-content">
                        <span class="pref-label">认知风格</span>
                    </div>
                    <select id="cognitive-style" class="pref-select" onchange="savePreferences()">
                        <option value="pragmatic">实践型</option>
                        <option value="visual">视觉型</option>
                        <option value="textual">文字型</option>
                    </select>
                </div>
                <div class="pref-item">
                    <div class="pref-icon" style="background: rgba(245,158,11,0.15);">
                        <i data-lucide="gauge" class="w-4 h-4 text-amber-400"></i>
                    </div>
                    <div class="pref-content">
                        <span class="pref-label">难度</span>
                    </div>
                    <select id="difficulty-pref" class="pref-select" onchange="savePreferences()">
                        <option value="basic">基础</option>
                        <option value="medium">中等</option>
                        <option value="advanced">高级</option>
                    </select>
                </div>
                <div class="pref-item">
                    <div class="pref-icon" style="background: rgba(16,185,129,0.15);">
                        <i data-lucide="message-circle" class="w-4 h-4 text-emerald-400"></i>
                    </div>
                    <div class="pref-content">
                        <span class="pref-label">苏格拉底</span>
                    </div>
                    <div class="toggle-switch active" id="socratic-toggle" onclick="toggleSwitch(this, 'socratic')"></div>
                </div>
                <div class="pref-item">
                    <div class="pref-icon" style="background: rgba(139,92,246,0.15);">
                        <i data-lucide="bell" class="w-4 h-4 text-violet-400"></i>
                    </div>
                    <div class="pref-content">
                        <span class="pref-label">学习提醒</span>
                    </div>
                    <div class="toggle-switch" id="reminder-toggle" onclick="toggleSwitch(this, 'reminder')"></div>
                </div>
                <div class="pref-item">
                    <div class="pref-icon" style="background: rgba(59,130,246,0.15);">
                        <i data-lucide="bell-ring" class="w-4 h-4 text-blue-400"></i>
                    </div>
                    <div class="pref-content">
                        <span class="pref-label">通知</span>
                    </div>
                    <div class="toggle-switch active" id="notification-toggle" onclick="toggleSwitch(this, 'notification')"></div>
                </div>
                <div class="pref-item">
                    <div class="pref-icon" style="background: rgba(255,255,255,0.08);">
                        <i data-lucide="shield" class="w-4 h-4" style="color: var(--text-secondary);"></i>
                    </div>
                    <div class="pref-content">
                        <span class="pref-label">隐私</span>
                    </div>
                    <div class="toggle-switch" id="privacy-toggle" onclick="toggleSwitch(this, 'privacy')"></div>
                </div>
            </div>
            <!-- 提醒时间 -->
            <div id="reminder-settings" class="reminder-time hidden">
                <span class="time-label">提醒时间</span>
                <div class="time-buttons">
                    <button class="time-btn" onclick="setReminderTime(this, '08:00')">08:00</button>
                    <button class="time-btn" onclick="setReminderTime(this, '10:00')">10:00</button>
                    <button class="time-btn active" onclick="setReminderTime(this, '14:00')">14:00</button>
                    <button class="time-btn" onclick="setReminderTime(this, '19:00')">19:00</button>
                    <button class="time-btn" onclick="setReminderTime(this, '21:00')">21:00</button>
                </div>
            </div>
        </section>

        <!-- 第三行：头像风格 -->
        <section class="avatar-section">
            <div class="section-header">
                <i data-lucide="smile" class="w-3 h-3"></i>
                <span>头像风格</span>
            </div>
            <div class="avatar-grid" id="avatar-grid"></div>
        </section>

        <!-- 第四行：数据统计 -->
        <section class="stats-section">
            <div class="mini-stat-card">
                <div class="mini-stat-icon" style="background: rgba(245,158,11,0.15);">
                    <i data-lucide="flame" class="w-4 h-4 text-amber-400"></i>
                </div>
                <div class="mini-stat-content">
                    <span class="mini-stat-value" id="stat-interactions">0</span>
                    <span class="mini-stat-label">交互</span>
                </div>
            </div>
            <div class="mini-stat-card">
                <div class="mini-stat-icon" style="background: rgba(59,130,246,0.15);">
                    <i data-lucide="clock" class="w-4 h-4 text-blue-400"></i>
                </div>
                <div class="mini-stat-content">
                    <span class="mini-stat-value" id="stat-time">0</span>
                    <span class="mini-stat-label">分钟</span>
                </div>
            </div>
            <div class="mini-stat-card">
                <div class="mini-stat-icon" style="background: rgba(16,185,129,0.15);">
                    <i data-lucide="check-circle" class="w-4 h-4 text-emerald-400"></i>
                </div>
                <div class="mini-stat-content">
                    <span class="mini-stat-value" id="stat-tasks">0</span>
                    <span class="mini-stat-label">完成</span>
                </div>
            </div>
        </section>

        <!-- 第五行：学习目标 -->
        <section class="goals-section">
            <div class="section-header">
                <i data-lucide="target" class="w-3 h-3"></i>
                <span>学习目标</span>
            </div>
            <div class="goal-tags" id="goal-tags"></div>
            <div class="daily-goal-row">
                <span class="goal-label">每日</span>
                <input type="range" id="daily-goal-slider" min="15" max="180" value="60" class="goal-slider" oninput="updateDailyGoal(this.value)">
                <span class="goal-value" id="daily-goal-display">60分钟</span>
            </div>
        </section>

        <!-- 第六行：学习任务 -->
        <section class="tasks-section">
            <div class="section-header">
                <i data-lucide="book-open" class="w-3 h-3"></i>
                <span>学习任务</span>
            </div>
            <div class="task-grid" id="task-grid"></div>
        </section>

    </main>

    <!-- 头像裁剪弹窗 -->
    <div id="crop-modal" class="crop-modal hidden">
        <div class="crop-modal-overlay" onclick="cancelCrop()"></div>
        <div class="crop-modal-content">
            <div class="crop-modal-header">
                <h3>
                    <i data-lucide="crop" class="w-4 h-4"></i> 裁剪头像
                </h3>
                <button onclick="cancelCrop()" aria-label="关闭">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="crop-area">
                <img id="crop-preview-img" src="" alt="预览">
            </div>
            <div class="crop-actions">
                <button onclick="cancelCrop()" class="btn-ghost">取消</button>
                <button onclick="confirmCrop()" class="btn-primary">确认</button>
            </div>
        </div>
    </div>

    <script src="/js/personal.js"></script>
</body>
</html>
