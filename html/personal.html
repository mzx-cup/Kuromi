<!DOCTYPE html>
<html lang="zh-CN" data-theme="ocean">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星识 Star-Learn - 个人中心</title>
    <link rel="stylesheet" href="/css/tailwind.css">
    <link rel="stylesheet" href="/css/personal.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/js/theme.js"></script>
</head>
<body>

    <div class="personal-bg">
        <div class="mesh-orb mesh-orb-1"></div>
        <div class="mesh-orb mesh-orb-2"></div>
        <div class="mesh-orb mesh-orb-3"></div>
    </div>

    <div class="personal-container">

        <nav class="personal-nav">
            <a href="/" class="nav-back">
                <i data-lucide="arrow-left"></i>
                <span>返回首页</span>
            </a>
            <h1 class="nav-title">个人中心</h1>
            <div style="width: 64px;"></div>
        </nav>

        <main class="personal-main">

            <section class="personal-section">
                <div class="section-header">
                    <div class="section-header-icon">
                        <i data-lucide="user-circle"></i>
                    </div>
                    <div>
                        <div class="section-title">个人信息</div>
                        <div class="section-subtitle">管理你的账号和头像</div>
                    </div>
                </div>

                <div class="identity-card">
                    <div class="avatar-wrapper">
                        <img id="current-avatar" src="" alt="头像" class="avatar">
                        <button class="avatar-edit" onclick="document.getElementById('avatar-upload').click()">
                            <i data-lucide="camera"></i>
                        </button>
                        <input type="file" id="avatar-upload" accept="image/*" class="hidden" onchange="handleAvatarUpload(event)">
                    </div>

                    <div class="identity-info">
                        <div class="identity-name-row">
                            <span class="identity-name" id="display-name">同学</span>
                            <span class="identity-badge">在线</span>
                        </div>
                        <div class="identity-edit">
                            <input type="text" id="edit-name" placeholder="修改昵称" class="identity-input">
                            <button onclick="saveName()" class="identity-btn">
                                <i data-lucide="check"></i>
                                保存
                            </button>
                        </div>
                    </div>

                    <div class="identity-actions">
                        <button onclick="goBack()" class="identity-action primary">
                            <i data-lucide="home"></i>
                            主页
                        </button>
                        <button onclick="clearData()" class="identity-action danger">
                            <i data-lucide="trash-2"></i>
                            清除
                        </button>
                    </div>
                </div>
            </section>

            <section class="personal-section">
                <div class="section-header">
                    <div class="section-header-icon">
                        <i data-lucide="settings"></i>
                    </div>
                    <div>
                        <div class="section-title">偏好设置</div>
                        <div class="section-subtitle">自定义你的学习体验</div>
                    </div>
                </div>

                <div class="prefs-grid">
                    <div class="pref-card">
                        <div class="pref-header">
                            <div class="pref-icon blue">
                                <i data-lucide="brain"></i>
                            </div>
                            <div>
                                <div class="pref-title">认知风格</div>
                                <div class="pref-subtitle">选择学习方式</div>
                            </div>
                        </div>
                        <select id="cognitive-style" class="pref-select" onchange="savePreferences()">
                            <option value="pragmatic">实践型</option>
                            <option value="visual">视觉型</option>
                            <option value="textual">文字型</option>
                        </select>
                    </div>

                    <div class="pref-card">
                        <div class="pref-header">
                            <div class="pref-icon amber">
                                <i data-lucide="gauge"></i>
                            </div>
                            <div>
                                <div class="pref-title">难度偏好</div>
                                <div class="pref-subtitle">挑战级别</div>
                            </div>
                        </div>
                        <select id="difficulty-pref" class="pref-select" onchange="savePreferences()">
                            <option value="basic">基础</option>
                            <option value="medium">中等</option>
                            <option value="advanced">高级</option>
                        </select>
                    </div>

                    <div class="pref-card">
                        <div class="pref-header">
                            <div class="pref-icon green">
                                <i data-lucide="message-circle"></i>
                            </div>
                            <div>
                                <div class="pref-title">苏格拉底模式</div>
                                <div class="pref-subtitle">引导式问答</div>
                            </div>
                        </div>
                        <div class="toggle active" id="socratic-toggle" onclick="toggleSwitch(this, 'socratic')"></div>
                    </div>

                    <div class="pref-card">
                        <div class="pref-header">
                            <div class="pref-icon violet">
                                <i data-lucide="bell"></i>
                            </div>
                            <div>
                                <div class="pref-title">学习提醒</div>
                                <div class="pref-subtitle">定时通知</div>
                            </div>
                        </div>
                        <div class="toggle" id="reminder-toggle" onclick="toggleSwitch(this, 'reminder')"></div>
                    </div>

                    <div class="pref-card">
                        <div class="pref-header">
                            <div class="pref-icon blue">
                                <i data-lucide="bell-ring"></i>
                            </div>
                            <div>
                                <div class="pref-title">系统通知</div>
                                <div class="pref-subtitle">消息推送</div>
                            </div>
                        </div>
                        <div class="toggle active" id="notification-toggle" onclick="toggleSwitch(this, 'notification')"></div>
                    </div>

                    <div class="pref-card">
                        <div class="pref-header">
                            <div class="pref-icon violet">
                                <i data-lucide="shield"></i>
                            </div>
                            <div>
                                <div class="pref-title">隐私保护</div>
                                <div class="pref-subtitle">数据安全</div>
                            </div>
                        </div>
                        <div class="toggle" id="privacy-toggle" onclick="toggleSwitch(this, 'privacy')"></div>
                    </div>
                </div>

                <div id="reminder-settings" class="hidden mt-6">
                    <div style="border-top: 1px solid var(--glass-border); padding-top: 20px; margin-top: 20px;">
                        <div class="time-tags-container">
                            <span class="time-tags-label">提醒时间</span>
                            <div class="time-tags-grid">
                                <button class="time-tag" onclick="setReminderTime(this, '08:00')">
                                    <span class="time-tag-icon"><i data-lucide="sunrise"></i></span>
                                    08:00
                                </button>
                                <button class="time-tag" onclick="setReminderTime(this, '10:00')">
                                    <span class="time-tag-icon"><i data-lucide="sun"></i></span>
                                    10:00
                                </button>
                                <button class="time-tag active" onclick="setReminderTime(this, '14:00')">
                                    <span class="time-tag-icon"><i data-lucide="sun-medium"></i></span>
                                    14:00
                                </button>
                                <button class="time-tag" onclick="setReminderTime(this, '19:00')">
                                    <span class="time-tag-icon"><i data-lucide="sunset"></i></span>
                                    19:00
                                </button>
                                <button class="time-tag" onclick="setReminderTime(this, '21:00')">
                                    <span class="time-tag-icon"><i data-lucide="moon"></i></span>
                                    21:00
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="personal-section">
                <div class="section-header">
                    <div class="section-header-icon">
                        <i data-lucide="smile"></i>
                    </div>
                    <div>
                        <div class="section-title">头像风格</div>
                        <div class="section-subtitle">选择你喜欢的头像样式</div>
                    </div>
                </div>

                <div class="avatar-grid" id="avatar-grid"></div>
            </section>

            <section class="personal-section">
                <div class="section-header">
                    <div class="section-header-icon">
                        <i data-lucide="bar-chart-3"></i>
                    </div>
                    <div>
                        <div class="section-title">学习统计</div>
                        <div class="section-subtitle">追踪你的学习进度</div>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i data-lucide="flame"></i>
                        </div>
                        <div class="stat-value" id="stat-interactions">0</div>
                        <div class="stat-label">交互次数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i data-lucide="clock"></i>
                        </div>
                        <div class="stat-value" id="stat-time">0</div>
                        <div class="stat-label">学习分钟</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i data-lucide="check-circle"></i>
                        </div>
                        <div class="stat-value" id="stat-tasks">0</div>
                        <div class="stat-label">完成任务</div>
                    </div>
                </div>
            </section>

            <section class="personal-section">
                <div class="section-header">
                    <div class="section-header-icon">
                        <i data-lucide="target"></i>
                    </div>
                    <div>
                        <div class="section-title">学习目标</div>
                        <div class="section-subtitle">设定每日的学习计划</div>
                    </div>
                </div>

                <div class="goal-tags" id="goal-tags"></div>

                <div class="goal-slider-row">
                    <span class="goal-label">每日目标</span>
                    <input type="range" id="daily-goal-slider" min="15" max="180" value="60" class="goal-slider" oninput="updateDailyGoal(this.value)">
                    <span class="goal-value" id="daily-goal-display">60分钟</span>
                </div>
            </section>

            <section class="personal-section">
                <div class="section-header">
                    <div class="section-header-icon">
                        <i data-lucide="book-open"></i>
                    </div>
                    <div>
                        <div class="section-title">学习任务</div>
                        <div class="section-subtitle">选择想要练习的技能</div>
                    </div>
                </div>

                <div class="task-grid" id="task-grid"></div>
            </section>

        </main>
    </div>

    <div id="floating-alarm" class="floating-alarm">
        <div class="floating-alarm-header" id="floating-alarm-header">
            <div class="floating-alarm-title">
                <i data-lucide="alarm-clock"></i>
                学习提醒
            </div>
            <div class="floating-alarm-time-mini">
                <i data-lucide="clock"></i>
                <span id="floating-alarm-time-mini-display">14:00</span>
            </div>
            <div class="floating-alarm-controls">
                <button class="floating-alarm-btn minimize" onclick="toggleMinimizeAlarm()">
                    <i data-lucide="minus"></i>
                </button>
                <button class="floating-alarm-btn maximize hidden" onclick="toggleMinimizeAlarm()">
                    <i data-lucide="maximize-2"></i>
                </button>
                <button class="floating-alarm-btn" onclick="closeFloatingAlarm()">
                    <i data-lucide="x"></i>
                </button>
            </div>
        </div>
        <div class="floating-alarm-content">
            <div class="floating-alarm-time">
                <input type="number" id="alarm-hour" class="floating-alarm-time-input" min="1" max="12" value="14" onchange="updateAlarmDisplay()">
                <span class="floating-alarm-time-separator">:</span>
                <input type="number" id="alarm-minute" class="floating-alarm-time-input" min="0" max="59" value="00" onchange="updateAlarmDisplay()">
                <div class="floating-alarm-time-ampm">
                    <button class="floating-alarm-ampm-btn" id="alarm-am-btn" onclick="setAlarmAmPm('AM')">AM</button>
                    <button class="floating-alarm-ampm-btn active" id="alarm-pm-btn" onclick="setAlarmAmPm('PM')">PM</button>
                </div>
            </div>

            <div class="floating-alarm-quick-set">
                <button class="floating-alarm-quick-btn" onclick="setQuickTime(30)">30分钟后</button>
                <button class="floating-alarm-quick-btn" onclick="setQuickTime(60)">1小时后</button>
                <button class="floating-alarm-quick-btn" onclick="setQuickTime(120)">2小时后</button>
                <button class="floating-alarm-quick-btn" onclick="setQuickTime(180)">3小时后</button>
            </div>

            <div class="floating-alarm-repeat">
                <div class="floating-alarm-repeat-label">重复</div>
                <div class="floating-alarm-repeat-options">
                    <button class="floating-alarm-repeat-btn active" data-day="0" onclick="toggleDay(this, 0)">日</button>
                    <button class="floating-alarm-repeat-btn active" data-day="1" onclick="toggleDay(this, 1)">一</button>
                    <button class="floating-alarm-repeat-btn active" data-day="2" onclick="toggleDay(this, 2)">二</button>
                    <button class="floating-alarm-repeat-btn active" data-day="3" onclick="toggleDay(this, 3)">三</button>
                    <button class="floating-alarm-repeat-btn active" data-day="4" onclick="toggleDay(this, 4)">四</button>
                    <button class="floating-alarm-repeat-btn active" data-day="5" onclick="toggleDay(this, 5)">五</button>
                    <button class="floating-alarm-repeat-btn active" data-day="6" onclick="toggleDay(this, 6)">六</button>
                </div>
            </div>

            <div class="floating-alarm-actions">
                <button class="floating-alarm-action cancel" onclick="closeFloatingAlarm()">取消</button>
                <button class="floating-alarm-action save" onclick="saveFloatingAlarm()">保存提醒</button>
            </div>
        </div>
    </div>

    <button id="floating-alarm-trigger" class="floating-alarm-trigger" onclick="toggleAlarmPopup()">
        <i data-lucide="alarm-clock"></i>
    </button>

    <!-- Time Picker Popup Modal -->
    <div id="time-picker-modal" class="crop-modal">
        <div class="crop-modal-backdrop" onclick="closeTimePicker()"></div>
        <div class="crop-modal-content" style="max-width: 380px;">
            <div class="crop-modal-header">
                <div class="crop-modal-title">
                    <i data-lucide="clock"></i>
                    设置提醒时间
                </div>
                <button class="crop-modal-close" onclick="closeTimePicker()">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="floating-alarm-time" style="margin-bottom: 20px;">
                <input type="number" id="picker-hour" class="floating-alarm-time-input" min="1" max="12" value="14" onchange="updatePickerDisplay()">
                <span class="floating-alarm-time-separator">:</span>
                <input type="number" id="picker-minute" class="floating-alarm-time-input" min="0" max="59" value="00" onchange="updatePickerDisplay()">
                <div class="floating-alarm-time-ampm">
                    <button class="floating-alarm-ampm-btn" id="picker-am-btn" onclick="setPickerAmPm('AM')">AM</button>
                    <button class="floating-alarm-ampm-btn active" id="picker-pm-btn" onclick="setPickerAmPm('PM')">PM</button>
                </div>
            </div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;">
                <button class="floating-alarm-quick-btn" onclick="setPickerQuickTime(15)">15分钟后</button>
                <button class="floating-alarm-quick-btn" onclick="setPickerQuickTime(30)">30分钟后</button>
                <button class="floating-alarm-quick-btn" onclick="setPickerQuickTime(60)">1小时后</button>
                <button class="floating-alarm-quick-btn" onclick="setPickerQuickTime(120)">2小时后</button>
            </div>
            <div class="floating-alarm-actions">
                <button class="floating-alarm-action cancel" onclick="closeTimePicker()">取消</button>
                <button class="floating-alarm-action save" onclick="saveTimePicker()">确认</button>
            </div>
        </div>
    </div>

    <div id="crop-modal" class="crop-modal">
        <div class="crop-modal-backdrop" onclick="cancelCrop()"></div>
        <div class="crop-modal-content">
            <div class="crop-modal-header">
                <div class="crop-modal-title">
                    <i data-lucide="crop"></i>
                    裁剪头像
                </div>
                <button class="crop-modal-close" onclick="cancelCrop()">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="crop-area">
                <img id="crop-preview-img" src="" alt="预览">
            </div>
            <div class="crop-actions">
                <button class="crop-btn ghost" onclick="cancelCrop()">取消</button>
                <button class="crop-btn primary" onclick="confirmCrop()">确认</button>
            </div>
        </div>
    </div>

    <script src="/js/personal.js"></script>
    <script>
        if (window.lucide) lucide.createIcons();
    </script>
</body>
</html>
