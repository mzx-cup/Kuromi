<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星云陈列室 - 星识 Star-Learn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/stellar-showcase.css">
    <link rel="stylesheet" href="/css/notifications.css">
</head>
<body class="stellar-body">
    <!-- 星空背景 -->
    <div class="stellar-bg" id="stellar-bg"></div>

    <!-- 顶部导航 -->
    <nav class="stellar-nav">
        <div class="max-w-7xl mx-auto px-4 h-full flex items-center justify-between">
            <a href="/hub.html" class="flex items-center gap-3 text-white/80 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                <span class="text-sm">返回中枢</span>
            </a>
            <div class="flex items-center gap-2">
                <span class="text-amber-400 text-lg">✦</span>
                <h1 class="text-white font-semibold tracking-wide">星云陈列室</h1>
            </div>
            <div class="text-right">
                <span class="text-xs text-white/50">已解锁</span>
                <span class="text-amber-400 font-bold ml-1" id="badge-count">0</span>
                <span class="text-xs text-white/50">/ <span id="badge-total">0</span></span>
            </div>
        </div>
    </nav>

    <!-- 主内容区域 -->
    <main class="stellar-main">
        <!-- 统计概览 -->
        <div class="stats-overview">
            <div class="stat-card">
                <div class="stat-icon legendary">🏆</div>
                <div class="stat-info">
                    <div class="stat-value" id="legendary-count">0</div>
                    <div class="stat-label">传奇</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon epic">💎</div>
                <div class="stat-info">
                    <div class="stat-value" id="epic-count">0</div>
                    <div class="stat-label">史诗</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon rare">⭐</div>
                <div class="stat-info">
                    <div class="stat-value" id="rare-count">0</div>
                    <div class="stat-label">稀有</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon common">✦</div>
                <div class="stat-info">
                    <div class="stat-value" id="common-count">0</div>
                    <div class="stat-label">普通</div>
                </div>
            </div>
        </div>

        <!-- 分类标签 -->
        <div class="category-tabs">
            <button class="category-tab active" data-category="all">
                <span class="text-lg">✧</span>
                <span>全部</span>
            </button>
            <button class="category-tab" data-category="skill">
                <span class="text-lg">⚔</span>
                <span>技能徽章</span>
            </button>
            <button class="category-tab" data-category="course">
                <span class="text-lg">📜</span>
                <span>课程证书</span>
            </button>
            <button class="category-tab" data-category="master">
                <span class="text-lg">🌟</span>
                <span>大师成就</span>
            </button>
        </div>

        <!-- 徽章展示网格 -->
        <div class="badge-showcase" id="badge-showcase"></div>
    </main>

    <!-- 徽章详情模态框 -->
    <div class="badge-modal" id="badge-modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <button class="modal-close" id="modal-close">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
            <div class="modal-badge">
                <div class="badge-base large" id="modal-badge-base">
                    <div class="badge-icon" id="modal-icon-container"></div>
                    <div class="badge-glare"></div>
                    <div class="badge-glow"></div>
                </div>
            </div>
            <div class="modal-info">
                <h2 class="modal-title" id="modal-title">成就名称</h2>
                <p class="modal-desc" id="modal-desc">成就描述</p>
                <div class="modal-meta">
                    <span class="modal-tier" id="modal-tier">传奇</span>
                    <span class="modal-date" id="modal-date"></span>
                </div>
                <div class="modal-progress" id="modal-progress">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <div class="progress-text" id="progress-text">0 / 0</div>
                </div>
                <div class="modal-stats" id="modal-stats">
                    <div class="stat-item">
                        <span class="stat-value" id="stat-unlocked-time">-</span>
                        <span class="stat-label">解锁时间</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="stat-category">-</span>
                        <span class="stat-label">类别</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="stat-rarity">-</span>
                        <span class="stat-label">稀有度</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/achievements-data.js"></script>
    <script src="/js/achievement-manager.js"></script>
    <script src="/js/notifications.js"></script>
    <script src="/js/stellar-showcase.js"></script>
</body>
</html>
