<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星识·林场 - 专注花园</title>
    <link rel="stylesheet" href="/css/tailwind.css">
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/plant.css">
    <link rel="stylesheet" href="/css/notifications.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- 天空背景 -->
    <div class="plant-sky">
        <div class="plant-sun"></div>
        <div class="plant-cloud c1"></div>
        <div class="plant-cloud c2"></div>
        <div class="plant-cloud c3"></div>
    </div>

    <!-- 地面背景 -->
    <div class="plant-ground"></div>

    <!-- 装饰性落叶/花瓣粒子 -->
    <div class="falling-particles" id="falling-particles"></div>

    <!-- 页面主体 -->
    <div class="plant-page">

        <!-- 顶部导航栏 -->
        <nav class="plant-nav">
            <a href="javascript:void(0);" onclick="goBack()" class="plant-nav-back">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </a>
            <div class="plant-nav-title">
                <span class="nav-icon">🌱</span>
                <span>星识·林场</span>
            </div>
            <div class="plant-nav-right">
                <div class="seed-display-nav">
                    <span class="seed-icon">🌰</span>
                    <span id="seed-count-nav">0</span>
                </div>
                <div class="weather-display" id="weather-widget" onclick="openWeatherSettings()" style="cursor:pointer;" title="点击更改城市">
                    <span class="weather-icon" id="weather-icon">⛅</span>
                    <span class="weather-temp" id="weather-temp">--°C</span>
                    <span class="weather-city" id="weather-city">定位中</span>
                </div>
                <button class="weather-settings-btn" onclick="openWeatherSettings()" title="设置城市">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </button>
            </div>
        </nav>

        <!-- 农场主体 -->
        <div class="plant-main-card">

            <!-- 花盆区 -->
            <div class="plant-plot-section">
                <div class="plant-plot-title">🌿 我的农场 — 点击槽位，再点击「种植」播下神秘种子</div>
                <div class="plant-plot-grid" id="plant-pots">
                    <!-- 槽位由 JS 渲染 -->
                </div>
            </div>

            <!-- 植物信息 + 操作（木质指示牌风格） -->
            <div class="plant-info-panel">
                <div class="plant-info-left">
                    <div class="plant-main-emoji" id="plant-emoji-display">🌱</div>

                    <div class="plant-current-info">
                        <div class="plant-current-name" id="plant-name">选择一块地开始种植</div>
                        <div class="plant-current-stage" id="plant-stage">等待种植</div>
                    </div>

                    <div class="plant-timer-display">
                        <div class="plant-timer-value" id="plant-timer">--:--:--</div>
                        <div class="plant-timer-label-text">预计收获时间</div>
                    </div>

                    <div class="plant-status-bars">
                        <div class="plant-stat-row">
                            <div class="plant-stat-row-label">💧 水分</div>
                            <div class="plant-stat-row-value water" id="water-value">0%</div>
                            <div class="plant-stat-row-bar">
                                <div class="plant-stat-row-fill water" id="water-bar" style="width:0%"></div>
                            </div>
                        </div>
                        <div class="plant-stat-row">
                            <div class="plant-stat-row-label">🧪 营养</div>
                            <div class="plant-stat-row-value nutrient" id="nutrient-value">0%</div>
                            <div class="plant-stat-row-bar">
                                <div class="plant-stat-row-fill nutrient" id="nutrient-bar" style="width:0%"></div>
                            </div>
                        </div>
                    </div>

                    <div class="plant-action-row">
                        <button class="plant-action-btn plant-btn" id="plant-btn" onclick="plantSeed()">
                            <span class="btn-icon">🌱</span>
                            <span class="btn-label">种植</span>
                        </button>
                        <button class="plant-action-btn water-btn" id="water-btn" onclick="plantAction('water')">
                            <span class="btn-icon">💧</span>
                            <span class="btn-label">浇水</span>
                        </button>
                        <button class="plant-action-btn nutrient-btn" id="nutrient-btn" onclick="plantAction('nutrient')">
                            <span class="btn-icon">🧪</span>
                            <span class="btn-label">施肥</span>
                        </button>
                        <button class="plant-action-btn harvest-btn" id="harvest-btn" onclick="plantAction('harvest')" style="display:none;">
                            <span class="btn-icon">🌾</span>
                            <span class="btn-label">收获</span>
                        </button>
                        <button class="plant-action-btn insulation-btn" id="insulation-btn" onclick="toggle保温罩()" style="display:none;">
                            <span class="btn-icon">❄️</span>
                            <span class="btn-label">保温罩</span>
                        </button>
                    </div>

                    <div class="weather-tip" id="weather-tip" style="display:none;"></div>

                    <div class="plant-tip-box" id="plant-tip">
                        💡 点击上方槽位，然后点击"种植"播下神秘种子！稀有度只有在收获时才会揭晓~
                    </div>
                </div>
            </div>

        </div>

        <!-- 植物图鉴（博物志） -->
        <div class="plant-collection-section">
            <div class="plant-collection-header">
                <div class="plant-collection-title">
                    <span>📖</span>
                    植物图鉴 · 神秘种子，等你收获！
                </div>
                <div class="seed-display-nav" style="font-size:11px;background:rgba(0,0,0,0.2);border-color:rgba(255,255,255,0.1);">
                    <span style="color:rgba(255,255,255,0.7)">已拥有</span>
                    <span id="owned-count" style="color:#FFD54F;font-weight:800;">0</span>
                    <span style="color:rgba(255,255,255,0.5)">/80 种</span>
                </div>
            </div>
            <div class="plant-collection-grid" id="plant-collection">
                <!-- 图鉴由 JS 渲染 -->
            </div>
        </div>

    </div>

    <!-- 植物详情弹窗 -->
    <div class="plant-detail-modal" id="plant-detail-modal">
        <div class="plant-detail-overlay" onclick="closePlantDetail()"></div>
        <div class="plant-detail-card">
            <button class="plant-detail-close" onclick="closePlantDetail()">✕</button>
            <div class="plant-detail-header">
                <span class="plant-detail-emoji" id="detail-emoji">🌱</span>
                <div class="plant-detail-title">
                    <div class="plant-detail-name" id="detail-name">神秘植物</div>
                    <div class="plant-detail-rarity" id="detail-rarity">普通</div>
                </div>
            </div>
            <div class="plant-detail-desc" id="detail-desc">一种神秘的植物</div>
            <div class="plant-detail-stats">
                <div class="detail-stat-row">
                    <span class="detail-stat-label">📦 获取状态</span>
                    <span class="detail-stat-value" id="detail-obtained">未获取</span>
                </div>
                <div class="detail-stat-row">
                    <span class="detail-stat-label">📅 首次获取</span>
                    <span class="detail-stat-value" id="detail-obtained-time">--</span>
                </div>
                <div class="detail-stat-row">
                    <span class="detail-stat-label">🌾 收获次数</span>
                    <span class="detail-stat-value" id="detail-harvest-count">0</span>
                </div>
                <div class="detail-stat-row">
                    <span class="detail-stat-label">⭐ 稀有度</span>
                    <span class="detail-stat-value" id="detail-rarity-level">普通</span>
                </div>
                <div class="detail-stat-row">
                    <span class="detail-stat-label">⏱️ 生长时间</span>
                    <span class="detail-stat-value" id="detail-grow-time">--</span>
                </div>
            </div>
            <div class="plant-detail-variants">
                <div class="variants-title">🎨 收集进度</div>
                <div class="variants-grid">
                    <div class="variant-item" id="variant-normal">
                        <span class="variant-icon">🌱</span>
                        <span class="variant-label">普通</span>
                        <span class="variant-status" id="variant-normal-status">未获取</span>
                    </div>
                    <div class="variant-item" id="variant-异色">
                        <span class="variant-icon">🌈</span>
                        <span class="variant-label">异色</span>
                        <span class="variant-status" id="variant-异色-status">未获取</span>
                    </div>
                    <div class="variant-item" id="variant-炫彩">
                        <span class="variant-icon">✨</span>
                        <span class="variant-label">炫彩</span>
                        <span class="variant-status" id="variant-炫彩-status">未获取</span>
                    </div>
                    <div class="variant-item" id="variant-异色炫彩">
                        <span class="variant-icon">💎</span>
                        <span class="variant-label">异色炫彩</span>
                        <span class="variant-status" id="variant-异色炫彩-status">未获取</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 金币雨容器 -->
    <div class="gold-rain-container" id="gold-rain"></div>

    <script src="/js/data-layer.js"></script>
    <script src="/js/notifications.js"></script>
    <script src="/js/data-layer.js"></script>
    <script src="/js/achievements-data.js"></script>
    <script src="/js/data-layer.js"></script>
    <script src="/js/achievement-manager.js"></script>
    <script src="/js/data-layer.js"></script>
    <script src="/js/plant.js"></script>
    <script>
        // 返回按钮逻辑（与个人中心一致）
        function goBack() {
            const entrySource = sessionStorage.getItem('personal_entry_from');
            const referrer = document.referrer;
            let target = null;
            if (entrySource) {
                target = entrySource;
            } else if (referrer) {
                if (referrer.includes('/index') || referrer.includes('/hub')) {
                    target = referrer;
                } else if (referrer.includes('/html/')) {
                    target = referrer;
                }
            }
            if (target) {
                window.location.href = target;
            } else {
                window.location.href = '/hub.html';
            }
        }

        // 同步种子数量到导航栏
        document.addEventListener('DOMContentLoaded', function() {
            const seedCountNav = document.getElementById('seed-count-nav');
            if (seedCountNav) {
                const updateNav = () => {
                    const seeds = localStorage.getItem('starlearn_seeds') || '0';
                    seedCountNav.textContent = seeds;
                };
                updateNav();
                // 监听种子变化事件
                window.addEventListener('storage', (e) => {
                    if (e.key === 'starlearn_seeds') updateNav();
                });
                window.addEventListener('plantStateUpdated', updateNav);
            }
        });
    </script>
</body>
</html>
